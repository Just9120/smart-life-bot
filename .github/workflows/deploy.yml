name: Deploy VPS

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smart-life-bot-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Precheck required deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required GitHub Secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy main to VPS Docker runtime
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes -p 22 "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd /opt/smart-life-bot

          git rev-parse --is-inside-work-tree >/dev/null
          git fetch --all --prune
          git checkout main
          git pull --ff-only

          test -f .env
          test -f compose.yaml
          test -f Dockerfile
          test -f secrets/service-account.json

          docker compose build smart-life-bot
          docker compose run --rm smart-life-bot python -m smart_life_bot.runtime.preflight
          docker compose up -d --force-recreate smart-life-bot

          host_commit="$(git rev-parse --short HEAD)"
          echo "host_git_commit=${host_commit}"

          docker compose ps smart-life-bot

          container_id="$(docker compose ps -q smart-life-bot)"
          if [ -z "$container_id" ]; then
            echo "ERROR: smart-life-bot container is not running after deploy" >&2
            exit 1
          fi

          running_image_id="$(docker inspect --format='{{.Image}}' "$container_id")"
          built_image_id="$(docker compose images -q smart-life-bot | head -n 1)"
          echo "running_container_image_id=${running_image_id}"
          echo "built_service_image_id=${built_image_id:-unknown}"

          docker compose exec -T smart-life-bot python - <<'PY'
          from smart_life_bot.bot.telegram_transport import CALLBACK_DURATION
          import smart_life_bot.parsing.rule_based as rb

          assert CALLBACK_DURATION == "draft:duration"
          assert not hasattr(rb, "_DEFAULT_DURATION_MINUTES")
          print("post_deploy_runtime_verification=ok")
          PY

          docker compose logs --tail=100 smart-life-bot
          REMOTE_SCRIPT
